    <!-- Script para Internacionalización (i18n) -->
    <script src="data.js"></script>
    <script>
        let currentLang = 'es';

        function setLanguage(lang) {
            if (!portfolioData[lang]) return;
            currentLang = lang;
            
            // Textos estáticos para el switch
            document.getElementById('btn-en').textContent = 'ENGLISH';
            document.getElementById('btn-es').textContent = 'ESPAÑOL';

            // Actualizar botones UI
            if(lang === 'es') {
                document.getElementById('btn-es').classList.replace('text-darkMuted', 'text-white');
                document.getElementById('btn-en').classList.replace('text-white', 'text-darkMuted');
                document.documentElement.lang = 'es';
            } else {
                document.getElementById('btn-en').classList.replace('text-darkMuted', 'text-white');
                document.getElementById('btn-es').classList.replace('text-white', 'text-darkMuted');
                document.documentElement.lang = 'en';
            }

            // Actualizar textos dinámicamente y ocultar nodos vacíos
            const elements = document.querySelectorAll('[data-i18n]');
            elements.forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (portfolioData[lang][key]) {
                    el.style.display = ''; // Mostrar si estaba oculto
                    el.textContent = portfolioData[lang][key];
                } else {
                    el.style.display = 'none'; // Ocultar si no existe en data.js
                    el.textContent = '';
                }
            });
        }

        // Active section logic for navigation
        const observerOptions = {
            root: null,
            rootMargin: '-100px 0px -60% 0px', // Ajustado para registrar Hero correctamente
            threshold: 0
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    // Eliminar activo de todos
                    document.querySelectorAll('nav a').forEach(a => {
                        a.classList.remove('text-white');
                        a.classList.add('text-darkMuted');
                        const indicator = a.querySelector('.nav-indicator');
                        if(indicator) {
                            indicator.classList.remove('w-16', 'bg-cyan-500');
                            indicator.classList.add('w-8', 'bg-darkBorder');
                        }
                    });
                    
                    // Añadir activo al correspondiente
                    const activeLink = document.querySelector(`nav a[href="#${entry.target.id}"]`);
                    if (activeLink) {
                        activeLink.classList.remove('text-darkMuted');
                        activeLink.classList.add('text-white');
                        const indicator = activeLink.querySelector('.nav-indicator');
                        if(indicator) {
                            indicator.classList.remove('w-8', 'bg-darkBorder');
                            indicator.classList.add('w-16', 'bg-cyan-500');
                        }
                    }
                }
            });
        }, observerOptions);

        document.querySelectorAll('section[id]').forEach(section => {
            observer.observe(section);
        });

        // Initialize default lang
        document.addEventListener('DOMContentLoaded', () => {
            setLanguage(currentLang);
        });
    </script>
